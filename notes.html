---
title: "Notes"
layout: default
---

<main>
  <header><h1>{{ include.title | default: page.title }}</h1></header>
  <nav class="notes-categories smooth">
    <a href="#" class="active" data-category="all">All</a>
    <a href="#" data-category="projects">Projects</a>
    <a href="#" data-category="economics">Economics</a>
    <a href="#" data-category="personal">Personal</a>
    <a href="#" data-category="reviews">Reviews</a>
    <a href="#" data-category="bookmarks">Bookmarks</a>
  </nav>

  <nav class="notes-list smooth">
    {% for post in site.notes %}
    <div data-category="{{ post.category | downcase }}">
      <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%B %-d, %Y" }}</time>
      <div class="post-title-group">
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        {% if post.subtitle %}<p class="subtitle">{{ post.subtitle }}</p>{% endif %}
      </div>
    </div>
    {% endfor %}
  </nav>
</main>



<script>
  const tabs = document.querySelectorAll('.notes-categories a');
  const posts = document.querySelectorAll('.notes-list div');

  tabs.forEach(tab => {
    tab.addEventListener('click', e => {
      e.preventDefault();
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const cat = tab.dataset.category;
      posts.forEach(post => {
        post.style.display = (cat === 'all' || post.dataset.category === cat) ? '' : 'none';
      });
    });
  });
</script>
