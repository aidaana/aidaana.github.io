---
title: "Projects"
layout: default
---

<main>
  <header><h1>{{ include.title | default: page.title }}</h1></header>
  <nav class="projects-categories smooth">
    <a href="#" class="active" data-category="all">All</a>
    <a href="#" data-category="economic-modelling">Economic Modelling</a>
    <a href="#" data-category="data-analysis">Data Analysis</a>
    <a href="#" data-category="study-aids">Study Aids</a>
  </nav>

  <nav class="projects-list smooth">
    {% for post in site.projects %}
    <div data-category="{{ post.category | downcase }}">
      <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%B %-d, %Y" }}</time>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    </div>
    {% endfor %}
  </nav>
</main>

<script>
  const tabs = document.querySelectorAll('.projects-categories a');
  const posts = document.querySelectorAll('.projects-list div');

  tabs.forEach(tab => {
    tab.addEventListener('click', e => {
      e.preventDefault();
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const cat = tab.dataset.category;
      posts.forEach(post => {
        post.style.display = (cat === 'all' || post.dataset.category === cat) ? '' : 'none';
      });
    });
  });
</script>
